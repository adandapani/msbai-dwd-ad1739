name: Daily FIFA Data Update

on:
  schedule:
    # 6:00 AM ET every day (10:00 UTC)
    - cron: "0 10 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  update-bigquery:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install google-cloud-bigquery google-auth pandas pyarrow openpyxl db-dtypes

      - name: Decode GCP credentials
        env:
          GCP_SERVICE_ACCOUNT_B64: ${{ secrets.GCP_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "$GCP_SERVICE_ACCOUNT_B64" | base64 -d > /tmp/credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/credentials.json" >> $GITHUB_ENV

      - name: Upload Excel data to BigQuery
        run: python upload_to_bigquery.py

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/credentials.json
