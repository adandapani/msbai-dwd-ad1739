services:
  - type: web
    name: fifa-2026-dashboard
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python dashboard_gradio.py
    envVars:
      - key: GCP_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
